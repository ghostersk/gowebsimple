{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>{{block "title" .}}GoApp{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    surface: { 950:'#07090f', 900:'#0d1117', 800:'#161b27', 700:'#1e2535', 600:'#28314a' },
                    accent:  { DEFAULT:'#38bdf8', dim:'#0ea5e9' },
                    success: '#22c55e', warning: '#f59e0b', danger: '#ef4444',
                },
                fontFamily: {
                    sans: ['"Outfit"','sans-serif'],
                    mono: ['"JetBrains Mono"','monospace'],
                },
            }
        }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    {{block "head" .}}{{end}}
</head>
<body class="dark min-h-full bg-surface-900 text-gray-100 font-sans antialiased">
    {{block "content" .}}{{end}}
    <script src="/static/js/app.js"></script>
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
