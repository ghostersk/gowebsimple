{{template "base" .}}
{{define "title"}}Sign In — GoApp{{end}}

{{define "content"}}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm">

        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-2xl bg-accent/20 border border-accent/30 flex items-center justify-center mx-auto mb-4">
                {{navIcon "key"}}
            </div>
            <h2 class="text-2xl font-semibold text-white">Welcome back</h2>
            <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
        </div>

        <div class="card p-6">
            <form method="POST" action="/login" novalidate>
                <input type="hidden" name="next" value="{{.Next}}">

                <div class="mb-4">
                    <label class="field-label">Username</label>
                    <input type="text" name="username" value="{{.Username}}"
                           class="input-field" placeholder="your_username"
                           autocomplete="username" autofocus required>
                </div>

                <div class="mb-6">
                    <label class="field-label">Password</label>
                    <input type="password" name="password"
                           class="input-field" placeholder="••••••••"
                           autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-primary w-full justify-center">
                    Sign In
                </button>
            </form>
        </div>

        {{if .AllowRegistration}}
        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account?
            <a href="/register" class="text-accent hover:text-accent-dim transition-colors">Create one</a>
        </p>
        {{end}}
    </div>
</div>
{{end}}
