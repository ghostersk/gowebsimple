{{template "base" .}}

{{define "title"}}Contact — GoApp{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">

    <div class="mb-8">
        <h2 class="text-2xl font-semibold text-white">Get in Touch</h2>
        <p class="text-gray-500 text-sm mt-1">Server-side validation with no JS frameworks</p>
    </div>

    <div class="card p-6">
        <form method="POST" action="/contact" novalidate>

            <div class="mb-4">
                <label class="field-label">Name</label>
                <input type="text" name="name" value="{{.Form.Name}}"
                       class="input-field" placeholder="Your name"
                       required maxlength="100">
            </div>

            <div class="mb-4">
                <label class="field-label">Email</label>
                <input type="email" name="email" value="{{.Form.Email}}"
                       class="input-field" placeholder="you@example.com"
                       required>
            </div>

            <div class="mb-6">
                <label class="field-label">Message</label>
                <textarea name="message" rows="5"
                          class="input-field resize-none"
                          placeholder="Your message…"
                          required maxlength="2000">{{.Form.Message}}</textarea>
                <p class="text-xs text-gray-600 mt-1">Max 2 000 characters</p>
            </div>

            <button type="submit" class="btn-primary">Send Message</button>
        </form>
    </div>

</div>
{{end}}
