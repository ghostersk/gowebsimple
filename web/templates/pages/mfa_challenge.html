{{template "base" .}}
{{define "title"}}Two-Factor Authentication — GoApp{{end}}

{{define "content"}}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-accent/20 border border-accent/30 flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-semibold text-white">Two-Factor Authentication</h2>
            <p class="text-gray-500 text-sm mt-1">Enter the 6-digit code from your authenticator app</p>
        </div>

        <div class="card p-6">
            <form method="POST" action="/login/mfa" novalidate>
                <input type="hidden" name="pending_token" value="{{.PendingToken}}">
                <input type="hidden" name="next" value="{{.Next}}">

                <div class="mb-6">
                    <label class="field-label">Authentication Code</label>
                    <input type="text" name="code"
                           class="input-field font-mono tracking-[0.5em] text-center text-2xl py-3"
                           placeholder="000000" maxlength="6"
                           autocomplete="one-time-code" inputmode="numeric"
                           autofocus required>
                    <p class="text-xs text-gray-600 mt-2 text-center">Code refreshes every 30 seconds</p>
                </div>

                <button type="submit" class="btn-primary w-full justify-center">
                    Verify Code
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-600 mt-4">
            Lost access to your authenticator?
            <a href="mailto:admin@localhost" class="text-accent hover:underline">Contact administrator</a>
        </p>
    </div>
</div>
{{end}}
